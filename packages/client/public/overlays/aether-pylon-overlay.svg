<svg width="128" height="128" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="aetherAura" cx="50%" cy="46%" r="55%">
      <stop offset="0%" stop-color="#C4F6FF" stop-opacity="0.55"/>
      <stop offset="38%" stop-color="#53CFFF" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#53CFFF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="aetherSpire" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F0FDFF"/>
      <stop offset="45%" stop-color="#89E8FF"/>
      <stop offset="100%" stop-color="#2F90E3"/>
    </linearGradient>
    <radialGradient id="aetherGate" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.95"/>
      <stop offset="55%" stop-color="#A8F6FF" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#53CFFF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- charged aura -->
  <circle cx="64" cy="60" r="62" fill="url(#aetherAura)"/>

  <!-- base reflections -->
  <ellipse cx="64" cy="110" rx="42" ry="8" fill="#53CFFF" fill-opacity="0.18"/>
  <ellipse cx="64" cy="108" rx="26" ry="5" fill="#A8F6FF" fill-opacity="0.22"/>

  <!-- energy gate between the spires -->
  <ellipse cx="64" cy="66" rx="17" ry="36" fill="url(#aetherGate)"/>

  <!-- left spire -->
  <path d="M28 106 L35 50 L44 24 L53 50 L60 106 Z" fill="url(#aetherSpire)"/>
  <path d="M44 24 L53 50 L60 106 L51 106 L47 52 Z" fill="#2F90E3" fill-opacity="0.6"/>
  <path d="M44 24 L49 38 L39 43 L35 50 Z" fill="#F0FDFF"/>

  <!-- right spire -->
  <path d="M68 106 L75 50 L84 24 L93 50 L100 106 Z" fill="url(#aetherSpire)"/>
  <path d="M84 24 L93 50 L100 106 L91 106 L87 52 Z" fill="#2F90E3" fill-opacity="0.6"/>
  <path d="M84 24 L89 38 L79 43 L75 50 Z" fill="#F0FDFF"/>

  <!-- capstone orbs with halos -->
  <circle cx="44" cy="22" r="11" fill="#A8F6FF" fill-opacity="0.35"/>
  <circle cx="44" cy="22" r="6" fill="#FFFFFF"/>
  <circle cx="84" cy="22" r="11" fill="#A8F6FF" fill-opacity="0.35"/>
  <circle cx="84" cy="22" r="6" fill="#FFFFFF"/>

  <!-- energy arcs spanning the gate -->
  <path d="M44 26 C 56 8, 72 8, 84 26" stroke="#EFFFFF" stroke-width="3.2" stroke-linecap="round"/>
  <path d="M39 40 C 56 20, 72 20, 89 40" stroke="#5BD7FF" stroke-width="2.6" stroke-linecap="round" stroke-opacity="0.85"/>
  <path d="M48 60 C 58 50, 70 50, 80 60" stroke="#A8F6FF" stroke-width="3" stroke-linecap="round" stroke-opacity="0.7"/>

  <!-- floating shards / sparks -->
  <path d="M64 16 L67.5 23 L64 30 L60.5 23 Z" fill="#FFFFFF"/>
  <circle cx="22" cy="60" r="2.6" fill="#D5FBFF"/>
  <circle cx="106" cy="60" r="2.6" fill="#D5FBFF"/>
  <circle cx="64" cy="84" r="3.4" fill="#FFFFFF"/>
  <circle cx="64" cy="84" r="6" fill="#A8F6FF" fill-opacity="0.4"/>
</svg>
