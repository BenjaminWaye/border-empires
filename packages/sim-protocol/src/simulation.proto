syntax = "proto3";

package border_empires.simulation;

message CommandEnvelope {
  string command_id = 1;
  string session_id = 2;
  string player_id = 3;
  uint32 client_seq = 4;
  uint64 issued_at = 5;
  string type = 6;
  string payload_json = 7;
}

message SubscribePlayerRequest {
  string player_id = 1;
  string subscription_json = 2;
}

message PreparePlayerRequest {
  string player_id = 1;
  string rally_anchor_json = 2;
}

message UnsubscribePlayerRequest {
  string player_id = 1;
  string subscription_key = 2;
}

message PingRequest {
  uint64 at = 1;
}

message SubscriptionNamespaceRequest {}

message SeasonSummaryRequest {}

message SeasonSummaryResponse {
  bool ok = 1;
  string summary_json = 2;
}

message AdminPlayersRequest {}

message AdminPlayersResponse {
  bool ok = 1;
  string players_json = 2;
}

message GetRecentCommandsRequest {
  int32 limit = 1;
}

message GetRecentCommandsResponse {
  bool ok = 1;
  string commands_json = 2;
}

message SeasonArchivesResponse {
  bool ok = 1;
  string archives_json = 2;
}

message StartNextSeasonRequest {
  bool force = 1;
  // Optional JSON: { "playerId": string, "charges": number }. When present,
  // the named player is granted N Imperial Ward charges the first time they
  // spawn territory in the newly-started season (Emperor endorsement bonus).
  string imperial_ward_json = 2;
}

message StartNextSeasonResponse {
  bool ok = 1;
  string season_id = 2;
}

message SeedBarbariansRequest {
  int32 count = 1;
}

message SeedBarbariansResponse {
  bool ok = 1;
  int32 requested = 2;
  int32 placed = 3;
  string detail_json = 4;
}

message Ack {
  bool ok = 1;
}

message SubscriptionNamespaceResponse {
  bool ok = 1;
  string namespace = 2;
}

message TileDelta {
  uint32 x = 1;
  uint32 y = 2;
  string owner_id = 3;
  string ownership_state = 4;
  string terrain = 5;
  string resource = 6;
  string town_type = 7;
  string town_name = 8;
  string town_population_tier = 9;
  string dock_id = 10;
  optional string town_json = 11;
  optional string fort_json = 12;
  optional string observatory_json = 13;
  optional string siege_outpost_json = 14;
  optional string economic_structure_json = 15;
  optional string sabotage_json = 16;
  optional string shard_site_json = 17;
  string yield_json = 18;
  string yield_rate_json = 19;
  string yield_cap_json = 20;
  uint64 frontier_decay_at = 21;
  string frontier_decay_kind = 22;
  optional string muster_json = 23;
  bool ownership_clear_only = 24;
  // Fog-of-war authority tag: "VISIBLE" | "FOG" | "UNEXPLORED". Follows the
  // existing convention of plain restricted-value strings (see
  // ownership_state, terrain) rather than a proto enum.
  string visibility_state = 25;
  uint64 breach_shock_until = 26;
}

message DockRoute {
  string dock_id = 1;
  string tile_key = 2;
  string paired_dock_id = 3;
  repeated string connected_dock_ids = 4;
}

message SubscribePlayerAck {
  bool ok = 1;
  string player_id = 2;
  repeated TileDelta tiles = 3;
  string player_json = 4;
  string world_status_json = 5;
  repeated DockRoute docks = 6;
  string season_json = 7;
}

message FetchTileDetailRequest {
  string player_id = 1;
  uint32 x = 2;
  uint32 y = 3;
  bool full_visibility = 4;
}

message FetchTileDetailAck {
  bool ok = 1;
  string player_id = 2;
  uint32 x = 3;
  uint32 y = 4;
  repeated TileDelta tiles = 5;
  string player_upkeep_json = 6;
}

message PreparePlayerAck {
  bool ok = 1;
  string player_id = 2;
  bool spawned = 3;
}

message SimulationEvent {
  string event_type = 1;
  string command_id = 2;
  string player_id = 3;
  string action_type = 4;
  uint32 origin_x = 5;
  uint32 origin_y = 6;
  uint32 target_x = 7;
  uint32 target_y = 8;
  uint64 resolves_at = 9;
  string code = 10;
  string message = 11;
  bool attacker_won = 12;
  repeated TileDelta tile_deltas = 13;
  uint32 count = 14;
  string collect_mode = 15;
  double gold = 16;
  string strategic_json = 17;
  uint32 tiles = 18;
  uint32 collect_x = 19;
  uint32 collect_y = 20;
  string payload_json = 21;
  double pillaged_gold = 22;
  string pillaged_strategic_json = 23;
  string message_type = 24;
  double manpower_delta = 25;
  string combat_result_json = 26;
  repeated string cancelled_command_ids = 27;
}

service SimulationService {
  rpc SubmitCommand(CommandEnvelope) returns (Ack);
  rpc PreparePlayer(PreparePlayerRequest) returns (PreparePlayerAck);
  rpc SubscribePlayer(SubscribePlayerRequest) returns (SubscribePlayerAck);
  rpc FetchTileDetail(FetchTileDetailRequest) returns (FetchTileDetailAck);
  rpc UnsubscribePlayer(UnsubscribePlayerRequest) returns (Ack);
  rpc GetSubscriptionNamespace(SubscriptionNamespaceRequest) returns (SubscriptionNamespaceResponse);
  rpc Ping(PingRequest) returns (Ack);
  rpc GetCurrentSeasonSummary(SeasonSummaryRequest) returns (SeasonSummaryResponse);
  rpc GetAdminPlayers(AdminPlayersRequest) returns (AdminPlayersResponse);
  rpc GetRecentCommands(GetRecentCommandsRequest) returns (GetRecentCommandsResponse);
  rpc ListSeasonArchives(SeasonSummaryRequest) returns (SeasonArchivesResponse);
  rpc StartNextSeason(StartNextSeasonRequest) returns (StartNextSeasonResponse);
  rpc SeedBarbarians(SeedBarbariansRequest) returns (SeedBarbariansResponse);
  rpc StreamEvents(PingRequest) returns (stream SimulationEvent);
}
