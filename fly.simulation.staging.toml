app = "border-empires-simulation-staging"
primary_region = "arn"

[build]
  dockerfile = "Dockerfile.simulation"

[env]
  NODE_ENV = "staging"
  NODE_OPTIONS = "--max-old-space-size=360"
  SIMULATION_HOST = "0.0.0.0"
  SIMULATION_PORT = "50051"
  SIMULATION_METRICS_HOST = "0.0.0.0"
  SIMULATION_METRICS_PORT = "50052"
  SIMULATION_SNAPSHOT_EVERY_EVENTS = "20000"
  SIMULATION_CHECKPOINT_FORCE_AFTER_EVENTS = "40000"
  SIMULATION_CHECKPOINT_MAX_RSS_MB = "440"
  SIMULATION_CHECKPOINT_MAX_HEAP_USED_MB = "260"
  SIMULATION_STARTUP_REPLAY_COMPACTION_MIN_EVENTS = "2000"
  SIMULATION_GLOBAL_STATUS_BROADCAST_DEBOUNCE_MS = "15000"
  SIMULATION_HEALTH_PROBE_INTERVAL_MS = "5000"
  SIMULATION_HEALTH_PROBE_TIMEOUT_MS = "2000"
  SIMULATION_HEALTH_FAILURE_THRESHOLD = "3"
  SIMULATION_STARTUP_RECOVERY_TIMEOUT_MS = "300000"
  SIMULATION_ALLOW_SEED_RECOVERY_FALLBACK = "1"
  SIMULATION_DB_APPLY_SCHEMA = "1"
  SIMULATION_COMMAND_TRACE = "0"
  SIMULATION_ENABLE_AI_AUTOPILOT = "1"
  SIMULATION_ENABLE_SYSTEM_AUTOPILOT = "1"
  SIMULATION_AI_WORKER = "1"
  SIMULATION_AI_MAX_EVENT_LOOP_LAG_MS = "100"
  SIMULATION_RULESET_ID = "seasonal-default"
  SIMULATION_MAP_STYLE = "islands"
  SIMULATION_SEED_PROFILE = "default"

[[services]]
  protocol = "tcp"
  internal_port = 50051
  auto_start_machines = true
  auto_stop_machines = "off"
  min_machines_running = 1

  [[services.ports]]
    handlers = []
    port = 50051

[[services]]
  protocol = "tcp"
  internal_port = 50052
  auto_start_machines = true
  auto_stop_machines = "off"
  min_machines_running = 1

  [[services.ports]]
    handlers = []
    port = 50052

  [[services.http_checks]]
    grace_period = "20s"
    interval = "10s"
    method = "get"
    path = "/healthz"
    protocol = "http"
    timeout = "5s"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory = "512mb"
