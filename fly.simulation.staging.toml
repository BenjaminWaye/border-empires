app = "border-empires-simulation-staging"
primary_region = "arn"

[build]
  dockerfile = "Dockerfile.simulation"

[env]
  NODE_ENV = "staging"
  NODE_OPTIONS = "--max-old-space-size=320"
  SIMULATION_HOST = "0.0.0.0"
  SIMULATION_PORT = "50051"
  SIMULATION_SNAPSHOT_EVERY_EVENTS = "1000"
  SIMULATION_CHECKPOINT_MAX_RSS_MB = "260"
  SIMULATION_CHECKPOINT_MAX_HEAP_USED_MB = "170"
  SIMULATION_GLOBAL_STATUS_BROADCAST_DEBOUNCE_MS = "15000"
  SIMULATION_DB_APPLY_SCHEMA = "1"
  SIMULATION_ENABLE_AI_AUTOPILOT = "1"
  SIMULATION_ENABLE_SYSTEM_AUTOPILOT = "1"

[[services]]
  protocol = "tcp"
  internal_port = 50051
  auto_start_machines = true
  auto_stop_machines = "off"
  min_machines_running = 1

  [[services.ports]]
    handlers = []
    port = 50051

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory = "512mb"
