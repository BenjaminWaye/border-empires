name: Nightly load harness

on:
  schedule:
    # 02:00 UTC every night
    - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      soak_minutes:
        description: "Soak duration in minutes (default: 30)"
        required: false
        default: "30"

# Needed so the "Commit load results" step can `git push origin HEAD:main`
# using the default GITHUB_TOKEN. Without this, the whole job can be skipped
# ("No jobs were run") on protected branches.
permissions:
  contents: write

jobs:
  load-harness:
    name: Run load harness against local fixture
    runs-on: ubuntu-latest
    timeout-minutes: 60

    # This workflow runs entirely on the GitHub Actions runner against a
    # local simulation + gateway process loaded from a fixed DB snapshot.
    # It never touches staging or production — no Fly secrets, no Firebase
    # auth, no risk of the synthetic soak client expanding a live player's
    # territory. See docs/load-results/ for historical run output and
    # docs/agents/topics/load-harness.md for the fixture rationale and how
    # to publish a fresher snapshot.
    env:
      WS_URL: "ws://127.0.0.1:13101/ws"
      GATEWAY_METRICS_URL: "http://127.0.0.1:13101/metrics"
      SIMULATION_METRICS_URL: "http://127.0.0.1:50052/metrics"

      # Soak duration. Manual dispatch can override; schedule uses 30 min.
      LOAD_HARNESS_SOAK_MINUTES: ${{ github.event.inputs.soak_minutes || '30' }}
      LOAD_HARNESS_POLL_MS: "2000"
      LOAD_HARNESS_BATCH_ITERATIONS: "120"
      LOAD_HARNESS_SOAK_TIMEOUT_MS: "15000"
      LOAD_HARNESS_MIN_ACCEPTED_SAMPLES: "30"
      # Pause between soak batches so player-1 manpower regenerates; without this
      # every batch after the first starts drained and collects zero samples.
      LOAD_HARNESS_INTER_BATCH_PAUSE_MS: "20000"

      LOAD_HARNESS_SLACK_WEBHOOK: ${{ secrets.LOAD_HARNESS_SLACK_WEBHOOK }}

      # Loaded-state DB fixture (~1900+ tiles, 20 AI players, islands map)
      # published as a GitHub Release asset. Update FIXTURE_TAG when a
      # fresher/larger snapshot is captured from staging.
      FIXTURE_TAG: "load-harness-fixture-v1"
      FIXTURE_ASSET: "harness-fixture-v1.db"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Use a deploy key or PAT so the subsequent commit push works.
          token: ${{ secrets.GH_PAT || github.token }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          # node:sqlite (used by apps/simulation) requires Node 22.5+.
          node-version: "22"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace packages needed by the runtime
        run: |
          pnpm --filter @border-empires/shared build
          pnpm --filter @border-empires/game-domain build
          pnpm --filter @border-empires/client-protocol build
          pnpm --filter @border-empires/sim-protocol build

      - name: Download fixture snapshot
        run: |
          mkdir -p .local-data
          gh release download "${FIXTURE_TAG}" \
            --pattern "${FIXTURE_ASSET}" \
            --output ".local-data/${FIXTURE_ASSET}" \
            --repo "${{ github.repository }}"
          ls -la ".local-data/${FIXTURE_ASSET}"
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || github.token }}

      - name: Start simulation (background)
        run: |
          SIMULATION_SQLITE_PATH="$(pwd)/.local-data/${FIXTURE_ASSET}" \
          SIMULATION_SNAPSHOT_BUILD_INLINE=1 \
          SIMULATION_ENABLE_AI_AUTOPILOT=1 \
          SIMULATION_ENABLE_SYSTEM_AUTOPILOT=1 \
          SIMULATION_HOST=127.0.0.1 \
          SIMULATION_PORT=50051 \
          SIMULATION_METRICS_PORT=50052 \
          nohup pnpm --filter @border-empires/simulation run dev > /tmp/sim.log 2>&1 &
          echo "Simulation starting; log at /tmp/sim.log"

      - name: Start gateway (background)
        run: |
          PORT=13101 \
          SIMULATION_ADDRESS=127.0.0.1:50051 \
          nohup pnpm --filter @border-empires/realtime-gateway run dev > /tmp/gateway.log 2>&1 &
          echo "Gateway starting; log at /tmp/gateway.log"

      - name: Wait for gateway health + simulation readiness
        run: |
          for i in $(seq 1 30); do
            if curl -sf "http://127.0.0.1:13101/healthz" | grep -q '"connected":true'; then
              echo "Gateway + simulation ready after ${i} attempts."
              exit 0
            fi
            echo "  attempt ${i}/30 — sleeping 5s..."
            sleep 5
          done
          echo "::error::Gateway/simulation did not become ready in time."
          echo "--- sim.log ---"; cat /tmp/sim.log || true
          echo "--- gateway.log ---"; cat /tmp/gateway.log || true
          exit 1

      - name: Run load harness
        id: harness
        run: |
          mkdir -p docs/load-results
          node scripts/rewrite-load-harness.mjs 2>&1 | tee /tmp/harness-output.txt
          RESULT_FILE="$(tail -1 /tmp/harness-output.txt | grep -o 'docs/load-results/[^ ]*' || true)"
          echo "result_file=${RESULT_FILE}" >> "$GITHUB_OUTPUT"
        continue-on-error: true

      - name: Dump process logs on harness failure
        if: always() && steps.harness.outcome == 'failure'
        run: |
          echo "::group::sim.log"
          cat /tmp/sim.log || true
          echo "::endgroup::"
          echo "::group::gateway.log"
          cat /tmp/gateway.log || true
          echo "::endgroup::"

      - name: Upload process logs
        if: always() && steps.harness.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: load-harness-process-logs
          path: |
            /tmp/sim.log
            /tmp/gateway.log
            /tmp/harness-output.txt
          if-no-files-found: ignore
          retention-days: 14

      - name: Stop simulation and gateway
        if: always()
        run: |
          pkill -f "tsx watch src/main.ts" || true

      - name: Check Phase 6 gate metrics
        id: gate-check
        run: |
          RESULT_FILE="$(cat /tmp/harness-output.txt | grep -o 'docs/load-results/[^ ]*' | tail -1)"
          if [ -z "$RESULT_FILE" ] || [ ! -f "$RESULT_FILE" ]; then
            echo "ERROR: Result file not found — harness may have failed to start."
            exit 1
          fi

          echo "Result file: $RESULT_FILE"
          cat "$RESULT_FILE" | jq .

          # Phase 6 gate thresholds — see scripts/rewrite-load-harness.mjs for
          # the authoritative values; this step just surfaces them in CI logs.
          GATEWAY_LOOP=$(jq -r '.metrics.gatewayEventLoopMaxMs // 9999' "$RESULT_FILE")
          P95=$(jq -r '.soak.acceptedP95Ms // 9999' "$RESULT_FILE")
          SAMPLES=$(jq -r '.soak.acceptedSamples // 0' "$RESULT_FILE")
          BACKLOG=$(jq -r '.metrics.simHumanInteractiveBacklogMaxMs // 9999' "$RESULT_FILE")
          CHECKPOINT_RSS=$(jq -r '.metrics.simCheckpointRssMaxMb // 9999' "$RESULT_FILE")
          ALL_GREEN=$(jq -r '.allGatesGreen' "$RESULT_FILE")

          echo "accepted_samples=${SAMPLES}"
          echo "gateway_event_loop_max_ms=${GATEWAY_LOOP}"
          echo "accepted_p95_ms=${P95}"
          echo "sim_human_interactive_backlog_max_ms=${BACKLOG}"
          echo "sim_checkpoint_rss_max_mb=${CHECKPOINT_RSS}"
          echo "all_gates_green=${ALL_GREEN}"

          if [ "${ALL_GREEN}" != "true" ]; then
            echo "GATES FAILED — at least one Phase 6 gate metric exceeded threshold."
            exit 1
          fi

          echo "All Phase 6 gate metrics GREEN."

      - name: Commit load results
        if: always() && steps.harness.outcome != 'skipped'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          DATE="$(date -u +%Y-%m-%d)"
          RESULT_FILE="docs/load-results/${DATE}.json"

          if [ ! -f "${RESULT_FILE}" ]; then
            echo "No result file to commit."
            exit 0
          fi

          # docs/load-results/ is gitignored by default (agents historically
          # dumped scratch output there); force-add just the dated result file.
          git add -f "${RESULT_FILE}"
          git diff --cached --quiet && echo "Nothing to commit." && exit 0

          GATE_STATUS="PASS"
          if [ "${{ steps.gate-check.outcome }}" != "success" ]; then
            GATE_STATUS="FAIL"
          fi

          COMMIT_MSG=$'ci: load harness '"${DATE}"$' \u2014 gates '"${GATE_STATUS}"$'\n\nAuto-committed by nightly-load-harness workflow (local fixture run).\nRun: '"${{ github.run_id }}"
          git commit -m "${COMMIT_MSG}"

          if [ "${GITHUB_REF}" != "refs/heads/main" ]; then
            echo "Not on main (ref=${GITHUB_REF}) — skipping push to avoid fast-forwarding main from a feature branch."
            exit 0
          fi

          git push origin HEAD:main

      - name: Annotate PR / commit on failure
        if: failure()
        run: |
          echo "::error::Nightly load harness FAILED. Check docs/load-results/ for details."
          echo "::error::Phase 6 pre-flight requires 3 consecutive GREEN nights. Streak reset."

      - name: Notify Slack on gate failure
        if: failure() && env.LOAD_HARNESS_SLACK_WEBHOOK != ''
        env:
          SLACK_WEBHOOK_URL: ${{ env.LOAD_HARNESS_SLACK_WEBHOOK }}
        run: |
          RESULT_FILE="$(cat /tmp/harness-output.txt 2>/dev/null | grep -o 'docs/load-results/[^ ]*' | tail -1 || true)"
          if [ -n "${RESULT_FILE}" ] && [ -f "${RESULT_FILE}" ]; then
            SUMMARY="$(jq -r '"accepted_samples=\(.soak.acceptedSamples // "n/a") min_accepted_samples=\(.soak.minAcceptedSamples // "n/a") accepted_p95_ms=\(.soak.acceptedP95Ms // "n/a") accepted_p99_ms=\(.soak.acceptedP99Ms // "n/a") accepted_max_ms=\(.soak.acceptedMaxMs // "n/a") gateway_loop_max_ms=\(.metrics.gatewayEventLoopMaxMs // "n/a") sim_loop_max_ms=\(.metrics.simEventLoopMaxMs // "n/a") sim_backlog_max_ms=\(.metrics.simHumanInteractiveBacklogMaxMs // "n/a") sim_checkpoint_rss_max_mb=\(.metrics.simCheckpointRssMaxMb // "n/a")"' "${RESULT_FILE}")"
          else
            SUMMARY="no load-result file was produced"
          fi
          jq -n \
            --arg text "Nightly Border Empires load gates failed on ${GITHUB_REF_NAME}. ${SUMMARY}. Run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" \
            '{text: $text}' \
            | curl -sS -X POST -H 'content-type: application/json' --data @- "${SLACK_WEBHOOK_URL}"
