app = "border-empires-combined"
primary_region = "arn"

[build]
  dockerfile = "Dockerfile.combined"

[env]
  NODE_ENV = "production"
  HOST = "0.0.0.0"
  PORT = "8080"

  # Gateway
  GATEWAY_ALLOW_SEED_FALLBACK = "0"
  SIMULATION_ADDRESS = "127.0.0.1:50051"
  GATEWAY_SIMULATION_WAKE_ADDRESS = "127.0.0.1:50051"
  SIMULATION_RULESET_ID = "seasonal-default"
  SIMULATION_SEED_PROFILE = "default"
  SIMULATION_MAP_STYLE = "islands"
  GATEWAY_SIMULATION_PREPARE_TIMEOUT_MS = "10000"
  GATEWAY_SIMULATION_SUBSCRIBE_TIMEOUT_MS = "10000"
  GATEWAY_SIMULATION_PING_TIMEOUT_MS = "10000"
  GATEWAY_SIMULATION_SUBMIT_TIMEOUT_MS = "2500"
  GATEWAY_SIMULATION_HEALTH_FAILURE_THRESHOLD = "12"
  GATEWAY_SIMULATION_WAKE_TOTAL_TIMEOUT_MS = "30000"
  GATEWAY_DB_APPLY_SCHEMA = "1"
  GATEWAY_SQLITE_PATH = "/data/border-empires.db"
  GATEWAY_SLOW_LOGIN_ALERT_LABEL = "border-empires-combined"

  # Simulation (loopback within the same Node process)
  SIMULATION_SQLITE_PATH = "/data/border-empires.db"
  SIMULATION_HOST = "127.0.0.1"
  SIMULATION_PORT = "50051"
  SIMULATION_METRICS_HOST = "127.0.0.1"
  SIMULATION_METRICS_PORT = "50052"
  SIMULATION_SNAPSHOT_EVERY_EVENTS = "1000"
  SIMULATION_CHECKPOINT_FORCE_AFTER_EVENTS = "4000"
  SIMULATION_CHECKPOINT_MAX_RSS_MB = "700"
  SIMULATION_CHECKPOINT_MAX_HEAP_USED_MB = "480"
  SIMULATION_STARTUP_REPLAY_COMPACTION_MIN_EVENTS = "2000"
  SIMULATION_GLOBAL_STATUS_BROADCAST_DEBOUNCE_MS = "15000"
  # Player IDs excluded from all leaderboard surfaces (comma-separated).
  # Decode probe auth token JWT to get the user_id: JSON.parse(Buffer.from(token.split('.')[1], 'base64').toString()).user_id
  SIMULATION_NON_COMPETITIVE_PLAYER_IDS = "avumxUe8L6OluuTkdMZAb76ldCq1"
  SIMULATION_HEALTH_PROBE_INTERVAL_MS = "5000"
  SIMULATION_HEALTH_PROBE_TIMEOUT_MS = "2000"
  SIMULATION_HEALTH_FAILURE_THRESHOLD = "3"
  SIMULATION_STARTUP_RECOVERY_TIMEOUT_MS = "300000"
  SIMULATION_ALLOW_SEED_RECOVERY_FALLBACK = "1"
  SIMULATION_DB_APPLY_SCHEMA = "1"
  SIMULATION_COMMAND_TRACE = "0"
  SIMULATION_VISIBILITY_AUDIT = "1"
  SIMULATION_ENABLE_AI_AUTOPILOT = "1"
  SIMULATION_ENABLE_SYSTEM_AUTOPILOT = "1"
  MUSTER_SYSTEM_ENABLED = "true"
  EMPIRE_INTEGRITY_ENABLED = "true"
  SIMULATION_AI_WORKER = "1"
  SIMULATION_AI_MAX_EVENT_LOOP_LAG_MS = "100"
  SIMULATION_AI_PLAYER_COUNT = "5"
  SIMULATION_AI_TICK_MS = "200"
  NODE_OPTIONS = "--max-old-space-size=900"

[http_service]
  internal_port = 8080
  force_https = true
  auto_start_machines = true
  auto_stop_machines = "off"
  min_machines_running = 1
  processes = ["app"]

# Healthcheck that hits the gateway /healthz endpoint. The gateway and
# simulation share a Node event loop, so if planner / snapshot work blocks
# the loop for ~5s+, /healthz cannot respond and Fly counts this as a
# failure. After 3 consecutive failures (~45s of unresponsive loop) Fly
# restarts the machine. Matches staging — the 2026-05-18 v6 outage stalled
# prod for 37 minutes because the previous 120s grace + 30s interval + 10s
# timeout tolerated 28s-spike flapping without ever accumulating 3
# consecutive criticals. Tighter values catch this class of stall.
[[http_service.checks]]
  grace_period = "60s"
  interval = "15s"
  method = "GET"
  timeout = "5s"
  path = "/healthz"

[mounts]
  source = "be_combined_prod_data"
  destination = "/data"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  # 2048mb: post-season full-visibility logins materialize the whole 202,500-tile
  # world (~166MB transient each across sim build + proto + gRPC + gateway JSON);
  # concurrent post-season logins OOM-killed a 1024mb box. See #693 (inline build
  # cut CPU 4134ms→694ms) — memory headroom is the remaining post-season ceiling.
  memory = "2048mb"