<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Border Empires — World Gen Lab</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        background: #111;
        color: #eee;
        font-family: system-ui, sans-serif;
        display: flex;
        height: 100vh;
        overflow: hidden;
      }

      #sidebar {
        width: 280px;
        flex-shrink: 0;
        background: #1a1a1a;
        border-right: 1px solid #2a2a2a;
        padding: 12px;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      #sidebar h1 {
        font-size: 13px;
        font-weight: 600;
        color: #aaa;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        padding-bottom: 8px;
        border-bottom: 1px solid #2a2a2a;
      }

      #canvas-area {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #0d0d0d;
        position: relative;
        overflow: hidden;
      }

      canvas {
        image-rendering: pixelated;
        image-rendering: crisp-edges;
        max-width: 100%;
        max-height: 100%;
      }

      #status-bar {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        padding: 6px 12px;
        background: rgba(0,0,0,0.6);
        font-size: 11px;
        color: #666;
        display: flex;
        gap: 16px;
      }

      #status-bar span { color: #999; }

      /* Tweakpane overrides to match dark theme */
      .tp-dfwv { width: 100% !important; }

      #legend {
        font-size: 11px;
        color: #777;
        line-height: 1.8;
        padding: 8px 4px;
        border-top: 1px solid #2a2a2a;
        margin-top: 4px;
      }
      #legend p { margin-bottom: 2px; }
      .swatch {
        display: inline-block;
        width: 10px;
        height: 10px;
        border-radius: 2px;
        margin-right: 4px;
        vertical-align: middle;
      }
    </style>
  </head>
  <body>
    <div id="sidebar">
      <h1>World Gen Lab</h1>
      <div id="pane"></div>
      <div id="legend">
        <p><span class="swatch" style="background:#0f3064"></span>Deep sea</p>
        <p><span class="swatch" style="background:#1c5a9e"></span>Coastal sea</p>
        <p><span class="swatch" style="background:#3a6930"></span>Grass land</p>
        <p><span class="swatch" style="background:#b99e3e"></span>Sand biome</p>
        <p><span class="swatch" style="background:#585250"></span>Mountain</p>
        <p style="margin-top:6px; color:#555">Regions (enable tint):</p>
        <p><span class="swatch" style="background:#5ac846"></span>Fertile Plains</p>
        <p><span class="swatch" style="background:#144b14"></span>Deep Forest</p>
        <p><span class="swatch" style="background:#82694b"></span>Broken Highlands</p>
        <p><span class="swatch" style="background:#d2af41"></span>Ancient Heartland</p>
        <p><span class="swatch" style="background:#9b6ecd"></span>Crystal Wastes</p>
      </div>
    </div>
    <div id="canvas-area">
      <canvas id="world-canvas"></canvas>
      <div id="status-bar">
        <span id="status-text">Ready — click Generate</span>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
