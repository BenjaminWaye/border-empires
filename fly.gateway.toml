app = "border-empires-gateway"
primary_region = "arn"

[build]
  dockerfile = "Dockerfile.gateway"

[env]
  NODE_ENV = "production"
  HOST = "0.0.0.0"
  PORT = "8080"
  GATEWAY_ALLOW_SEED_FALLBACK = "0"
  GATEWAY_SNAPSHOT_DIR = "/app/packages/server/snapshots"
  SIMULATION_ADDRESS = "border-empires-simulation.flycast:50051"

[http_service]
  internal_port = 8080
  force_https = true
  auto_start_machines = true
  auto_stop_machines = "off"
  min_machines_running = 1
  processes = ["app"]

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory = "512mb"
