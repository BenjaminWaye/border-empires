app = "border-empires"
primary_region = "arn"

[build]
  dockerfile = "Dockerfile.server"

[env]
  NODE_ENV = "production"
  PORT = "8080"
  SNAPSHOT_DIR = "/data/snapshots"
  AI_PLAYERS = "5"
  AI_TICK_MS = "10000"

[http_service]
  internal_port = 8080
  force_https = true
  auto_start_machines = true
  auto_stop_machines = "off"
  min_machines_running = 1
  processes = ["app"]

[[mounts]]
  source = "border_empires_data"
  destination = "/data"
  initial_size = "1gb"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory = "512mb"
