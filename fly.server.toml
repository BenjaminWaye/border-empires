app = "border-empires"
primary_region = "arn"

[build]
  dockerfile = "Dockerfile.server"

[env]
  NODE_ENV = "production"
  PORT = "8080"
  SNAPSHOT_DIR = "/data/snapshots"
  AI_PLAYERS = "5"
  AI_TICK_MS = "10000"
  AI_DISPATCH_INTERVAL_MS = "250"
  AI_TICK_BATCH_SIZE = "1"
  AI_HUMAN_PRIORITY_BATCH_SIZE = "1"
  AI_HUMAN_DEFENSE_BATCH_SIZE = "2"
  AI_AUTH_PRIORITY_BATCH_SIZE = "1"
  AI_FRONTIER_SELECTOR_BUDGET_MS = "200"
  AI_DEFENSE_PRIORITY_MS = "15000"
  AI_WORKER_QUEUE_SOFT_LIMIT = "4"
  AI_SIM_QUEUE_SOFT_LIMIT = "6"
  AI_EVENT_LOOP_P95_SOFT_LIMIT_MS = "60"
  AI_EVENT_LOOP_UTILIZATION_SOFT_LIMIT_PCT = "65"
  AI_PLANNER_WORKER = "0"
  AI_PLANNER_TIMEOUT_MS = "750"
  SIM_COMBAT_WORKER = "1"
  SIM_COMBAT_TIMEOUT_MS = "750"
  CHUNK_SERIALIZER_WORKER = "1"
  CHUNK_SERIALIZER_TIMEOUT_MS = "750"
  SIM_DRAIN_BUDGET_MS = "12"
  SIM_DRAIN_MAX_COMMANDS = "8"
  SIM_DRAIN_HUMAN_QUOTA = "6"
  SIM_DRAIN_SYSTEM_QUOTA = "2"
  SIM_DRAIN_AI_QUOTA = "2"

[http_service]
  internal_port = 8080
  force_https = true
  auto_start_machines = true
  auto_stop_machines = "off"
  min_machines_running = 1
  processes = ["app"]

[[mounts]]
  source = "border_empires_data"
  destination = "/data"
  initial_size = "1gb"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory = "512mb"
